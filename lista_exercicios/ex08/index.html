<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 8 - Operador Ternário</title>
</head>
<body>
    <h1>Exercício 8: Positivo/Negativo/Zero (Ternário)</h1>
    <p>Abra o console (F12) ou recarregue a página para testar novamente.</p>
    <script>
        let numStr = prompt("Digite um número:");
        let numero = parseFloat(numStr);

        if (isNaN(numero)) {
            console.log("Valor inválido.");
        } else {
            // Operador Ternário
            let resultado = numero > 0 ? "Positivo" : (numero < 0 ? "Negativo" : "Zero");
            console.log(resultado);
        }
    </script>
</body>
</html>
