<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 16 - map</title>
</head>
<body>
    <h1>Exercício 16: Dobrar Valores (map)</h1>
    <p>Abra o console (F12) para ver o resultado.</p>
    <script>
        let arrayOriginal = [1, 2, 3, 4, 5];
        let arrayDobrado = arrayOriginal.map(function(numero) {
            return numero * 2;
        });

        console.log("Array original:", arrayOriginal);
        console.log("Array dobrado usando map():", arrayDobrado);
    </script>
</body>
</html>
