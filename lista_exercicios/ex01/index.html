<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 1 - Declaração let</title>
</head>
<body>
    <h1>Exercício 1: Declaração com let</h1>
    <p>Abra o console (F12) para ver o resultado.</p>
    <script>
        let idade = 20; // Atribua sua idade aqui
        let nova_idade = idade + 5;
        console.log(`Minha idade hoje é ${idade} e daqui a 5 anos será ${nova_idade}`);
    </script>
</body>
</html>
