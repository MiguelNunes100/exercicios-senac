<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 10 - Contagem Regressiva</title>
</head>
<body>
    <h1>Exercício 10: Contagem Regressiva (while)</h1>
    <p>Abra o console (F12) para ver o resultado.</p>
    <script>
        let contador = 10;
        console.log("Iniciando contagem regressiva:");
        while (contador >= 1) {
            console.log(contador);
            contador--; // decrementa o contador
        }
        console.log("Fogo!");
    </script>
</body>
</html>
