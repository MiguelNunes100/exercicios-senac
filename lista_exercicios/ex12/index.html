<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício 12 - for...of</title>
</head>
<body>
    <h1>Exercício 12: Percorrendo Arrays com for...of</h1>
    <p>Abra o console (F12) para ver o resultado.</p>
    <script>
        let frutas = ["Maçã", "Banana", "Laranja", "Uva", "Melancia"];

        console.log("Lista de Frutas:");
        for (let fruta of frutas) {
            console.log(fruta);
        }
    </script>
</body>
</html>
